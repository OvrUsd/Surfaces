<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>surfaces.io - Éditeur Cadastral</title>
  
  <script>const _cw=console.warn;console.warn=function(){if(arguments[0]&&typeof arguments[0]==='string'&&arguments[0].includes('cdn.tailwindcss.com'))return;_cw.apply(console,arguments)}</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body, html { margin: 0; padding: 0; overflow: hidden; background-color: #f8fafc; }
    input[type=range] { accent-color: #2A9D8F; }
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; min-height: 40px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    @media (max-width: 768px) {
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    }
    .toast-in { animation: toastIn .3s ease-out forwards; }
    .toast-out { animation: toastOut .3s ease-in forwards; }
    @keyframes toastIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toastOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(16px)} }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo, useCallback } = React;

    const R = 6378137;
    const ORIGIN_SHIFT = 2 * Math.PI * R / 2.0;
    const INITIAL_RESOLUTION = 2 * Math.PI * R / 256.0;
    const TILE_CACHE_MAX = 512;

    let _idCounter = 0;
    const uid = () => `id_${Date.now()}_${++_idCounter}`;

    const pxToGeo = (px, py, vp) => ({
      x: vp.center.x + (px - vp.width / 2) * vp.resolution,
      y: vp.center.y - (py - vp.height / 2) * vp.resolution
    });
    const geoToPx = (gx, gy, vp) => ({
      x: vp.width / 2 + (gx - vp.center.x) / vp.resolution,
      y: vp.height / 2 - (gy - vp.center.y) / vp.resolution
    });

    const getTileAtGeo = (gx, gy, z) => {
      const res = INITIAL_RESOLUTION / Math.pow(2, z);
      const px = (gx + ORIGIN_SHIFT) / res;
      const py = (ORIGIN_SHIFT - gy) / res;
      return { tx: Math.floor(px / 256), ty: Math.floor(py / 256) };
    };
    const getGeoAtTile = (tx, ty, z) => {
      const res = INITIAL_RESOLUTION / Math.pow(2, z);
      const px = tx * 256;
      const py = ty * 256;
      return { gx: px * res - ORIGIN_SHIFT, gy: ORIGIN_SHIFT - py * res };
    };

    const hexToRgba = (hex, alpha) => {
      const cleanHex = hex.replace('#', '');
      const r = parseInt(cleanHex.substring(0, 2), 16);
      const g = parseInt(cleanHex.substring(2, 4), 16);
      const b = parseInt(cleanHex.substring(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    };

    // Cache DVF
    window.dvfCache = window.dvfCache || {};

    function Toast({ message, type, onDone }) {
      const [exiting, setExiting] = useState(false);
      useEffect(() => { const t = setTimeout(() => setExiting(true), 3500); return () => clearTimeout(t); }, []);
      useEffect(() => { if (exiting) { const t = setTimeout(onDone, 300); return () => clearTimeout(t); } }, [exiting]);
      const bg = type === 'error' ? 'bg-red-600' : type === 'success' ? 'bg-emerald-600' : 'bg-slate-800';
      return (
        <div className={`${exiting ? 'toast-out' : 'toast-in'} fixed bottom-6 left-1/2 -translate-x-1/2 z-[9999] px-5 py-3 rounded-xl text-white text-sm font-medium shadow-2xl pointer-events-none ${bg}`}>
          {message}
        </div>
      );
    }

    function App() {
      const [viewport, setViewport] = useState({ center: { x: 0, y: 0 }, resolution: 0.5, width: 800, height: 600 });
      const [mapMode, setMapMode] = useState('none'); 
      const [renderTrigger, setRenderTrigger] = useState(0); 
      const [darkMode, setDarkMode] = useState(false);
      
      const [polygons, setPolygons] = useState([]);
      const [lines, setLines] = useState([]); 
      const [currentPoints, setCurrentPoints] = useState([]);
      const [dvfLinks, setDvfLinks] = useState([]); // [{from: {x,y}, to: {x,y}}] lignes DVF multiples
      const [mode, setMode] = useState('upload'); 
      const [isLoading, setIsLoading] = useState(false);
      const [baseMap, setBaseMap] = useState('ortho');
      const [sidebarOpen, setSidebarOpen] = useState(false); 
      
      const [activeParcelData, setActiveParcelData] = useState(null);
      const [activePanelTab, setActivePanelTab] = useState('diag'); 
      
      const [isDragging, setIsDragging] = useState(false);
      const dragStartRef = useRef({ x: 0, y: 0 });
      const dragMovedRef = useRef(false);
      
      const containerRef = useRef(null);
      const canvasRef = useRef(null);
      const tileCache = useRef({}); 
      const tileCacheKeys = useRef([]);
      
      const [toast, setToast] = useState(null);
      const showToast = useCallback((message, type = 'info') => {
        setToast({ message, type, key: uid() });
      }, []); 
      
      const [addressQuery, setAddressQuery] = useState('');
      const [addressResults, setAddressResults] = useState([]);
      const [searchHistory, setSearchHistory] = useState([]); // [{label, feature}]
      const [isSearching, setIsSearching] = useState(false);
      const [searchError, setSearchError] = useState('');
      
      const [localImage, setLocalImage] = useState(null);
      const [calibrationPoints, setCalibrationPoints] = useState([]);
      const [knownDistance, setKnownDistance] = useState('');
      const [unitsPerMeter, setUnitsPerMeter] = useState(null);
      const [calibrationUnit, setCalibrationUnit] = useState('m');
      const [displayUnit, setDisplayUnit] = useState('m²');
      const [dvfRadius, setDvfRadius] = useState(500); // rayon DVF en mètres
      
      // Sauvegarde des contextes pour switcher entre carte API et image locale
      const apiContextRef = useRef({ polygons: [], lines: [], viewport: null, activeParcelData: null });
      const localContextRef = useRef({ polygons: [], lines: [], viewport: null, calibrationPoints: [], unitsPerMeter: null, localImage: null });
      
      const presetColors = [
        { label: 'Océan', hex: '#264653' }, { label: 'Émeraude', hex: '#2A9D8F' },
        { label: 'Sable', hex: '#E9C46A' }, { label: 'Safran', hex: '#F4A261' },
        { label: 'Terre cuite', hex: '#E76F51' }, { label: 'Rouge', hex: '#ef4444' },
        { label: 'Rose', hex: '#ec4899' }, { label: 'Violet', hex: '#a855f7' },
        { label: 'Bleu', hex: '#3b82f6' }, { label: 'Cyan', hex: '#06b6d4' },
        { label: 'Vert', hex: '#22c55e' }, { label: 'Jaune', hex: '#eab308' },
      ];
      
      const [activeColor, setActiveColor] = useState(presetColors[1].hex);
      const [parcelName, setParcelName] = useState('Parcelle A');
      const [editingPolygonId, setEditingPolygonId] = useState(null);
      const [polygonOpacity, setPolygonOpacity] = useState(0.5); 

      const formatArea = (sqMeters, unit) => {
        if (sqMeters === null || sqMeters === undefined) return '';
        switch (unit) {
          case 'mm²': return (sqMeters * 1000000).toLocaleString('fr-FR', { maximumFractionDigits: 0 }) + ' mm²';
          case 'cm²': return (sqMeters * 10000).toLocaleString('fr-FR', { maximumFractionDigits: 1 }) + ' cm²';
          case 'm²': return sqMeters.toLocaleString('fr-FR', { maximumFractionDigits: 2 }) + ' m²';
          case 'ha': return (sqMeters / 10000).toLocaleString('fr-FR', { maximumFractionDigits: 4 }) + ' ha';
          case 'km²': return (sqMeters / 1000000).toLocaleString('fr-FR', { maximumFractionDigits: 4 }) + ' km²';
          default: return sqMeters.toLocaleString('fr-FR', { maximumFractionDigits: 2 }) + ' m²';
        }
      };

      const formatDistance = (meters) => {
        if (meters < 1000) return `${meters.toLocaleString('fr-FR', { maximumFractionDigits: 2 })} m`;
        return `${(meters/1000).toLocaleString('fr-FR', { maximumFractionDigits: 2 })} km`;
      };
      
      const areaSummaryByColor = useMemo(() => {
        const summary = {};
        polygons.forEach(poly => {
          if (poly.area !== null && poly.area !== undefined) {
            if (!summary[poly.border]) summary[poly.border] = 0;
            summary[poly.border] += poly.area;
          }
        });
        return summary;
      }, [polygons]);

      useEffect(() => {
        const observer = new ResizeObserver(entries => {
          for (let entry of entries) {
            setViewport(v => ({ ...v, width: entry.contentRect.width, height: entry.contentRect.height }));
          }
        });
        if (containerRef.current) observer.observe(containerRef.current);
        return () => observer.disconnect();
      }, []);

      useEffect(() => {
        const query = addressQuery.trim();
        if (query.length < 3) { setAddressResults([]); setSearchError(''); return; }
        setIsSearching(true);
        const controller = new AbortController();
        const timer = setTimeout(async () => {
          try {
            // Construire l'URL avec bias de position si on a une vue active
            let url = `https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(query)}&limit=7&autocomplete=1`;
            // Si on a un viewport centré (carte active), biaiser les résultats vers cette zone
            if (mapMode === 'api' && viewport.center.x !== 0) {
              const lonBias = (viewport.center.x / R) * 180 / Math.PI;
              const latBias = (2 * Math.atan(Math.exp(viewport.center.y / R)) - Math.PI / 2) * 180 / Math.PI;
              url += `&lat=${latBias.toFixed(5)}&lon=${lonBias.toFixed(5)}`;
            }
            const res = await fetch(url, { signal: controller.signal });
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (data?.features?.length > 0) {
              // Dédupliquer et prioriser : adresses exactes d'abord, puis rues, puis communes
              const seen = new Set();
              const unique = data.features.filter(f => {
                const key = f.properties.label;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
              });
              setAddressResults(unique); setSearchError('');
            } else {
              setAddressResults([]); setSearchError('Aucune adresse trouvée.');
            }
          } catch (err) {
            if (err.name !== 'AbortError') setSearchError('Erreur de connexion avec le serveur.');
          } finally { setIsSearching(false); }
        }, 300);
        return () => { clearTimeout(timer); controller.abort(); };
      }, [addressQuery]);

      const loadMapFromAddress = (feature) => {
        // Ajouter à l'historique (en haut, sans doublon)
        const label = feature.properties.label;
        setSearchHistory(prev => [{ label, feature }, ...prev.filter(h => h.label !== label)].slice(0, 5));
        setAddressResults([]);
        setAddressQuery(feature.properties.label);
        const lon = feature.geometry.coordinates[0];
        const lat = feature.geometry.coordinates[1];
        const x = (lon * Math.PI / 180) * R;
        const y = Math.log(Math.tan(Math.PI / 4 + (lat * Math.PI / 180) / 2)) * R;
        // Sauvegarder le contexte local si on vient du mode image
        if (mapModeRef.current === 'local') {
          localContextRef.current = { polygons: polygonsRef.current, lines: linesRef.current, viewport: viewportRef.current, calibrationPoints: calibrationPointsRef.current, unitsPerMeter: unitsPerMeterRef.current, localImage: localImageRef.current };
        }
        // Restaurer les calques API existants
        const ac = apiContextRef.current;
        if (ac.polygons.length > 0) {
          setPolygons(ac.polygons); setLines(ac.lines);
        }
        setViewport(v => ({ ...v, center: { x, y }, resolution: 0.5 })); 
        setLocalImage(null); setMapMode('api'); setMode('auto-select'); setParcelName('Parcelle A');
        setActiveParcelData(ac.activeParcelData || null);
        setActivePanelTab('diag');
      };

      const fetchParcelFromClick = async (lon, lat) => {
        setIsLoading(true);
        try {
          const geomQuery = JSON.stringify({ type: "Point", coordinates: [lon, lat] });
          const res = await fetch(`https://apicarto.ign.fr/api/cadastre/parcelle?geom=${encodeURIComponent(geomQuery)}`);
          if (!res.ok) throw new Error();
          const data = await res.json();
          
          if (data.features && data.features.length > 0) {
            const parcel = data.features[0];
            const num = parcel.properties.numero;
            const section = parcel.properties.section;
            const codeCommune = parcel.properties.code_com || parcel.properties.commune || "";
            const prefix = parcel.properties.prefixe || parcel.properties.com_abs || "000";
            // L'ID parcelle au format standard DVF : CODE_COMMUNE(5) + PREFIX(3) + SECTION(2) + NUMERO(4)
            const parcelId = codeCommune + prefix + (section || "").padStart(2, '0') + (num || "").padStart(4, '0');
            // Section préfixée pour l'API DVF Etalab : PREFIX(3) + SECTION(2)
            const sectionPrefixee = prefix + (section || "").padStart(2, '0'); 
            
            let rings = parcel.geometry.type === 'Polygon' ? [parcel.geometry.coordinates[0]] : parcel.geometry.coordinates.map(p => p[0]);
            const geoPoints = rings[0].map(coord => ({
              x: (coord[0] * Math.PI / 180) * R, y: Math.log(Math.tan(Math.PI / 4 + (coord[1] * Math.PI / 180) / 2)) * R
            }));
            
            // Vérifier si cette parcelle existe déjà dans les calques
            const existingPoly = polygonsRef.current.find(p => p.isOfficial && p.name === `Parcelle ${num}` && p.parcelData?.section === section);
            if (existingPoly) {
              // Resélectionner la parcelle existante
              if (existingPoly.parcelData) {
                setActiveParcelData(existingPoly.parcelData);
                setActivePanelTab('diag');
              }
              // Centrer la vue dessus avec animation
              let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
              for (const pt of existingPoly.points) { if(pt.x<minX)minX=pt.x;if(pt.x>maxX)maxX=pt.x;if(pt.y<minY)minY=pt.y;if(pt.y>maxY)maxY=pt.y; }
              const newRes = Math.max((maxX-minX)/(viewport.width*0.4),(maxY-minY)/(viewport.height*0.4),0.15);
              animateViewport({x:(minX+maxX)/2,y:(minY+maxY)/2}, newRes);
              setIsLoading(false);
              return;
            }
            
            setPolygons(prev => [...prev, { 
              id: uid(), name: `Parcelle ${num}`, points: geoPoints, border: activeColor, area: parcel.properties.contenance, isOfficial: true
            }]);

            setActiveParcelData({ num, section, isLoading: true });
            setActivePanelTab('diag');

            try {
               const resGeo = await fetch(`https://api-adresse.data.gouv.fr/reverse/?lon=${lon}&lat=${lat}`);
               const dataGeo = await resGeo.json();
               let citycode = ''; let cityname = '';
               if(dataGeo.features && dataGeo.features.length > 0) {
                   citycode = dataGeo.features[0].properties.citycode;
                   cityname = dataGeo.features[0].properties.city;
               }
               
               // ZONAGE PLU + lien règlement (un seul appel)
               let zoning = null;
               let reglementUrl = null;
               try {
                   const resGpu = await fetch(`https://apicarto.ign.fr/api/gpu/zone-urba?geom=${encodeURIComponent(JSON.stringify({type:"Point",coordinates:[lon,lat]}))}`);
                   if (resGpu.ok) {
                       const dataGpu = await resGpu.json();
                       if (dataGpu.features && dataGpu.features.length > 0) {
                           const zoneProps = dataGpu.features[0].properties;
                           const types = { 'U': 'Urbaine', 'AU': 'À urbaniser', 'A': 'Agricole', 'N': 'Naturelle' };
                           const typeLibelle = types[zoneProps.typezone] || 'PLU';
                           zoning = `Zone ${typeLibelle} ${zoneProps.libelle ? '('+zoneProps.libelle+')' : ''}`.trim();
                           if (zoneProps.partition) {
                               reglementUrl = `https://www.geoportail-urbanisme.gouv.fr/map/#tile=1&lon=${lon}&lat=${lat}&zoom=18`;
                           }
                       }
                   }
               } catch(e) {}

               let finalRisks = [];
               const baseQueryParams = `form-adresse=true&isCadastre=false&city=${encodeURIComponent(cityname)}&type=coord&typeForm=adresse&codeInsee=${citycode}&lon=${lon}&lat=${lat}&go_back=%2F&propertiesType=coord&adresse=${encodeURIComponent(cityname)}`;
               const parcelReportUrl = `https://www.georisques.gouv.fr/mes-risques/connaitre-les-risques-pres-de-chez-moi/rapport2?${baseQueryParams}`;

               // On lance toutes les requêtes en parallèle pour la rapidité
               const geomPoint = encodeURIComponent(JSON.stringify({type:"Point",coordinates:[lon,lat]}));
               const [resRadon, resGaspar, resCavites, resMvt, resPpr, resCatnat, resPrescriptions, resServitudes, resCommune] = await Promise.allSettled([
                   fetch(`https://www.georisques.gouv.fr/api/v1/radon?code_insee=${citycode}`).then(r => r.ok ? r.json() : null),
                   fetch(`https://www.georisques.gouv.fr/api/v1/gaspar/risques?code_insee=${citycode}`).then(r => r.ok ? r.json() : null),
                   fetch(`https://www.georisques.gouv.fr/api/v1/cavites?code_insee=${citycode}&page=1&page_size=10`).then(r => r.ok ? r.json() : null),
                   fetch(`https://www.georisques.gouv.fr/api/v1/mvt?code_insee=${citycode}&page=1&page_size=10`).then(r => r.ok ? r.json() : null),
                   fetch(`https://www.georisques.gouv.fr/api/v1/ppr?code_insee=${citycode}&page=1&page_size=50`).then(r => r.ok ? r.json() : null),
                   fetch(`https://www.georisques.gouv.fr/api/v1/gaspar/catnat?code_insee=${citycode}&page=1&page_size=100`).then(r => r.ok ? r.json() : null),
                   fetch(`https://apicarto.ign.fr/api/gpu/prescription-surf?geom=${geomPoint}`).then(r => r.ok ? r.json() : null),
                   fetch(`https://apicarto.ign.fr/api/gpu/assiette-sup-s?geom=${geomPoint}`).then(r => r.ok ? r.json() : null),
                   fetch(`https://geo.api.gouv.fr/communes/${citycode}?fields=nom,population,surface,codesPostaux,departement,region`).then(r => r.ok ? r.json() : null),
               ]);

               // ── RADON ──
               try {
                   const dataRad = resRadon.status === 'fulfilled' ? resRadon.value : null;
                   if (dataRad?.data?.length > 0) {
                       const cat = String(dataRad.data[0].classe_potentiel || "");
                       let color = 'yellow', sev = `Potentiel Moyen (catégorie ${cat})`;
                       if (cat === '3') { color = 'red'; sev = 'Potentiel Élevé (catégorie 3)'; }
                       else if (cat === '1') { color = 'green'; sev = 'Potentiel Faible (catégorie 1)'; }
                       finalRisks.push({ name: "Potentiel Radon", scope: "Commune", colorCode: color, severity: sev });
                   }
               } catch(e) {}

               // ── GASPAR (risques communaux : TOUS les risques) ──
               try {
                   const dataGaspar = resGaspar.status === 'fulfilled' ? resGaspar.value : null;
                   if (dataGaspar?.data) {
                       const seenRisks = new Set();
                       let sismiciteAdded = false;

                       dataGaspar.data.forEach(item => {
                           // Extraire la zone sismique si présente (une seule fois)
                           if (!sismiciteAdded && item.risques_detail) {
                               item.risques_detail.forEach(detail => {
                                   if (detail.zone_sismicite && !sismiciteAdded) {
                                       sismiciteAdded = true;
                                       const z = String(detail.zone_sismicite);
                                       let color = 'yellow', sev = `Zone ${z} — Modéré`;
                                       if (z === '1') { color = 'green'; sev = 'Zone 1 — Très faible'; }
                                       else if (z === '2') { color = 'green'; sev = 'Zone 2 — Faible'; }
                                       else if (z === '3') { color = 'yellow'; sev = 'Zone 3 — Modéré'; }
                                       else if (z === '4') { color = 'red'; sev = 'Zone 4 — Moyen'; }
                                       else if (z === '5') { color = 'red'; sev = 'Zone 5 — Fort'; }
                                       finalRisks.push({ name: "Séisme", scope: "Commune", colorCode: color, severity: sev });
                                   }
                               });
                           }

                           // Tous les risques GASPAR (plus de filtrage argile/séisme !)
                           if (item.risques_detail && Array.isArray(item.risques_detail)) {
                               item.risques_detail.forEach(detail => {
                                   const riskName = detail.libelle_risque_long || '';
                                   if (!riskName || seenRisks.has(riskName.toLowerCase())) return;
                                   // Ignorer séisme ici (déjà traité au-dessus avec la zone)
                                   if (riskName.toLowerCase().includes('séisme') || riskName.toLowerCase().includes('seisme')) return;
                                   seenRisks.add(riskName.toLowerCase());
                                   
                                   const sev = detail.etat_zone_risque || detail.etat_bassin_risque || "Existant";
                                   let color = 'yellow';
                                   const sLow = sev.toLowerCase();
                                   const rnLow = riskName.toLowerCase();
                                   
                                   // Couleur basée sur le niveau ET le type de risque
                                   if (sLow.includes('fort') || sLow.includes('élevé') || sLow.includes('majeur') || sLow.includes('important')) color = 'red';
                                   else if (sLow.includes('faible') || sLow.includes('nul') || sLow.includes('pas de risque') || sLow.includes('abrogé')) color = 'green';
                                   else if (sLow.includes('existant') || sLow.includes('concern') || sLow.includes('reconnu')) color = 'yellow';
                                   
                                   // Forcer rouge pour certains risques graves
                                   if (rnLow.includes('rupture') || rnLow.includes('seveso') || rnLow.includes('nucléaire')) color = 'red';
                                   
                                   finalRisks.push({ name: riskName, scope: "Commune", colorCode: color, severity: sev });
                               });
                           }
                           
                           // Risques parent (libelle global) s'ils n'ont pas de détails
                           if (item.libelle_risque_long && (!item.risques_detail || item.risques_detail.length === 0)) {
                               const riskName = item.libelle_risque_long;
                               if (!seenRisks.has(riskName.toLowerCase())) {
                                   seenRisks.add(riskName.toLowerCase());
                                   const sev = item.etat_arrete || item.etat_risque || "Existant";
                                   finalRisks.push({ name: riskName, scope: "Commune", colorCode: 'yellow', severity: sev });
                               }
                           }
                       });
                   }
               } catch(e) {}

               // ── PPR (Plans de Prévention des Risques — très riche) ──
               try {
                   const dataPpr = resPpr.status === 'fulfilled' ? resPpr.value : null;
                   if (dataPpr?.data?.length > 0) {
                       // Extraire les types de risques couverts par les PPR
                       const pprTypes = new Map();
                       dataPpr.data.forEach(ppr => {
                           const etat = ppr.etat?.libelle_etat || '';
                           const isActive = etat.toLowerCase().includes('approuv') || etat.toLowerCase().includes('prescri');
                           if (!isActive) return;
                           
                           const risques = ppr.risques || [];
                           risques.forEach(r => {
                               const name = r.libelle_risque_long || r.libelle_risque || '';
                               if (name && !pprTypes.has(name)) {
                                   pprTypes.set(name, { pprName: ppr.nom_ppr || '', etat: etat });
                               }
                           });
                       });
                       
                       if (pprTypes.size > 0) {
                           pprTypes.forEach(({ pprName, etat }, riskName) => {
                               // Eviter les doublons avec GASPAR
                               const rnLow = riskName.toLowerCase();
                               const alreadyExists = finalRisks.some(r => r.name.toLowerCase() === rnLow);
                               if (!alreadyExists) {
                                   finalRisks.push({ name: riskName, scope: "PPR", colorCode: 'red', severity: `PPR ${etat}` });
                               }
                           });
                       }
                   }
               } catch(e) {}

               // ── CAVITÉS SOUTERRAINES ──
               try {
                   const dataCav = resCavites.status === 'fulfilled' ? resCavites.value : null;
                   const total = dataCav?.results || dataCav?.data?.length || 0;
                   if (total > 0) {
                       finalRisks.push({ name: "Cavités souterraines", scope: "Commune", colorCode: 'yellow', severity: `${total} cavité(s) répertoriée(s)` });
                   }
               } catch(e) {}

               // ── MOUVEMENTS DE TERRAIN ──
               try {
                   const dataMvt = resMvt.status === 'fulfilled' ? resMvt.value : null;
                   const total = dataMvt?.results || dataMvt?.data?.length || 0;
                   if (total > 0) {
                       finalRisks.push({ name: "Mouvements de terrain (historique)", scope: "Commune", colorCode: 'yellow', severity: `${total} événement(s) répertorié(s)` });
                   }
               } catch(e) {}

               // ── CATASTROPHES NATURELLES (CATNAT) ──
               let catnatCount = 0;
               try {
                   const dataCatnat = resCatnat.status === 'fulfilled' ? resCatnat.value : null;
                   catnatCount = dataCatnat?.results || dataCatnat?.data?.length || 0;
                   if (catnatCount > 0) {
                       finalRisks.push({ name: `Catastrophes naturelles historiques`, scope: "Commune", colorCode: 'yellow', severity: `${catnatCount} arrêté(s) CATNAT sur la commune` });
                   }
               } catch(e) {}

               // ── PRESCRIPTIONS D'URBANISME (GPU) ──
               let prescriptions = [];
               try {
                   const dataPres = resPrescriptions.status === 'fulfilled' ? resPrescriptions.value : null;
                   if (dataPres?.features?.length > 0) {
                       // Prescriptions pertinentes à garder
                       const keepKeywords = ['hauteur', 'aspect', 'emprise', 'cos', 'recul', 'alignement', 'retrait', 'densit', 'stationnement'];
                       prescriptions = dataPres.features.map(f => {
                           const p = f.properties || {};
                           return {
                               libelle: p.libelle || 'Prescription',
                               valeur: p.txt || '',
                               type: p.typepsc || '',
                           };
                       }).filter(p => {
                           const l = p.libelle.toLowerCase();
                           return keepKeywords.some(k => l.includes(k));
                       });
                   }
               } catch(e) {}

               // ── SERVITUDES D'UTILITÉ PUBLIQUE (GPU) ──
               let servitudes = [];
               try {
                   const dataSup = resServitudes.status === 'fulfilled' ? resServitudes.value : null;
                   if (dataSup?.features?.length > 0) {
                       servitudes = dataSup.features.map(f => {
                           const p = f.properties || {};
                           // Rendre le nom lisible : PM1_PPRn_Lez_Mosson_ass → PPRn Lez Mosson
                           let nom = p.nomass || p.libelle || 'Servitude';
                           nom = nom.replace(/^[A-Z0-9]+_/, '').replace(/_ass$/, '').replace(/_/g, ' ');
                           return {
                               libelle: nom,
                               type: p.typeass || '',
                               subtype: p.suptype || '',
                           };
                       }).filter(s => s.libelle);
                   }
               } catch(e) {}

               // ── INFOS COMMUNE (API Géo) ──
               let communeInfo = null;
               try {
                   const dataCommune = resCommune.status === 'fulfilled' ? resCommune.value : null;
                   if (dataCommune) {
                       communeInfo = {
                           population: dataCommune.population || null,
                           surface: dataCommune.surface ? (dataCommune.surface / 100).toFixed(0) : null, // hectares → km²
                           codePostal: dataCommune.codesPostaux?.[0] || '',
                           departement: dataCommune.departement?.nom || '',
                           region: dataCommune.region?.nom || '',
                       };
                   }
               } catch(e) {}

               // ── HISTORIQUE DVF (Ventes) ──
               let dvfData = [];
               let prixMoyenM2 = null;
               let prixMedianM2 = null;
               const cleanVal = (v) => (v === null || v === undefined || v === 'None' || v === 'none' || v === 'nan' || v === 'NaN' || v === '') ? null : v;
               try {
                   // 1) Etalab : ventes de la section cadastrale (parcelle exacte + voisines)
                   let mutationsData = [];
                   const cacheKey = citycode + '_' + sectionPrefixee;
                   
                   if (window.dvfCache[cacheKey]) {
                       mutationsData = window.dvfCache[cacheKey];
                   } else {
                       try {
                           const etalabRes = await fetch(`https://app.dvf.etalab.gouv.fr/api/mutations3/${citycode}/${sectionPrefixee}`);
                           if (etalabRes.ok) {
                               const eJson = await etalabRes.json();
                               mutationsData = eJson.mutations || [];
                               window.dvfCache[cacheKey] = mutationsData;
                           }
                       } catch(e) {}
                   }

                   // 2) CQuest : ventes dans un rayon géographique (alentours)
                   let cquestData = [];
                   try {
                       const cqRes = await fetch(`https://api.cquest.org/dvf?lat=${lat}&lon=${lon}&dist=${dvfRadius}`);
                       if (cqRes.ok) {
                           const cqJson = await cqRes.json();
                           cquestData = cqJson.resultats || [];
                       }
                   } catch(e) {}

                   const uniqueKeys = new Set();
                   
                   // Parser Etalab
                   mutationsData.forEach(m => {
                       const props = m.properties || m;
                       let ids = [];
                       if(props.id_parcelle) {
                           if(Array.isArray(props.id_parcelle)) ids = props.id_parcelle;
                           else if(typeof props.id_parcelle === 'string') ids = props.id_parcelle.split('|').map(s=>s.trim());
                       }

                       let isExact = false;
                       ids.forEach(id => {
                           if (!id) return;
                           if (parcelId && (id === parcelId || id.endsWith(section + num.padStart(4,'0')))) isExact = true;
                       });
                       
                       const nMut = (props.nature_mutation || "").toLowerCase();
                       if (nMut.includes("vente") || nMut.includes("adjudication")) {
                           const val = props.valeur_fonciere || "NC";
                           const dateStr = props.date_mutation || "";
                           const key = `${dateStr}_${val}_${ids[0] || ''}`;
                           if (!uniqueKeys.has(key)) {
                               uniqueKeys.add(key);
                               dvfData.push({
                                   ...props, displayId: ids[0] || parcelId,
                                   isExactParcel: isExact, valeur: parseFloat(val) || null,
                                   dateStr: dateStr, source: 'section'
                               });
                           }
                       }
                   });

                   // Parser CQuest (alentours)
                   cquestData.forEach(m => {
                       const nMut = (m.nature_mutation || "").toLowerCase();
                       if (!nMut.includes("vente") && !nMut.includes("adjudication")) return;
                       const val = String(m.valeur_fonciere || '0').replace(/,/g, '.');
                       const dateStr = m.date_mutation || '';
                       const id = m.numero_plan || m.id_parcelle || '';
                       const isExact = id === parcelId;
                       if (parseFloat(val) > 0 && dateStr) {
                           const key = `${dateStr}_${val}_${id}`;
                           if (!uniqueKeys.has(key)) {
                               uniqueKeys.add(key);
                               dvfData.push({
                                   ...m, displayId: id,
                                   isExactParcel: isExact, valeur: parseFloat(val) || null,
                                   dateStr: dateStr, source: 'rayon'
                               });
                           }
                       }
                   });
                   
                   // Tri: parcelles exactes en premier, puis par date décroissante
                   dvfData.sort((a,b) => {
                       if (a.isExactParcel !== b.isExactParcel) return a.isExactParcel ? -1 : 1;
                       return new Date(b.dateStr) - new Date(a.dateStr);
                   });
                   dvfData = dvfData.slice(0, 30);

                   // Géocoder les ventes pour calculer la distance à la parcelle
                   // Regrouper par adresse pour éviter les doublons de requêtes
                   const addrCache = {};
                   const toGeocode = [];
                   dvfData.forEach(d => {
                       if (d.isExactParcel) { d.distance = 0; return; }
                       const addr = cleanVal(d.adresse_nom_voie);
                       const num = cleanVal(d.adresse_numero) || '';
                       if (!addr) return;
                       const fullAddr = `${num} ${addr}, ${cityname}`.trim();
                       if (addrCache[fullAddr] !== undefined) return;
                       addrCache[fullAddr] = null; // placeholder
                       toGeocode.push(fullAddr);
                   });
                   
                   // Géocoder max 8 adresses en parallèle
                   if (toGeocode.length > 0) {
                       try {
                           const geocResults = await Promise.allSettled(
                               toGeocode.slice(0, 8).map(addr => 
                                   fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(addr)}&limit=1`)
                                       .then(r => r.ok ? r.json() : null)
                               )
                           );
                           geocResults.forEach((res, i) => {
                               if (res.status === 'fulfilled' && res.value?.features?.[0]) {
                                   const coords = res.value.features[0].geometry.coordinates;
                                   addrCache[toGeocode[i]] = { lon: coords[0], lat: coords[1] };
                               }
                           });
                       } catch(e) {}
                   }
                   
                   // Calculer la distance pour chaque vente
                   dvfData.forEach(d => {
                       if (d.isExactParcel) { d.distance = 0; return; }
                       const addr = cleanVal(d.adresse_nom_voie);
                       const num = cleanVal(d.adresse_numero) || '';
                       const fullAddr = `${num} ${addr}, ${cityname}`.trim();
                       const geo = addrCache[fullAddr];
                       if (geo) {
                           // Distance Haversine simplifiée
                           const dLat = (geo.lat - lat) * Math.PI / 180;
                           const dLon = (geo.lon - lon) * Math.PI / 180;
                           const a2 = Math.sin(dLat/2)**2 + Math.cos(lat*Math.PI/180)*Math.cos(geo.lat*Math.PI/180)*Math.sin(dLon/2)**2;
                           d.distance = Math.round(6371000 * 2 * Math.atan2(Math.sqrt(a2), Math.sqrt(1-a2)));
                       } else {
                           d.distance = null;
                       }
                   });
                   
                   // Re-trier : parcelle exacte d'abord, puis par distance croissante, puis par date
                   dvfData.sort((a,b) => {
                       if (a.isExactParcel !== b.isExactParcel) return a.isExactParcel ? -1 : 1;
                       if (a.distance !== null && b.distance !== null) return a.distance - b.distance;
                       if (a.distance !== null) return -1;
                       if (b.distance !== null) return 1;
                       return new Date(b.dateStr) - new Date(a.dateStr);
                   });
                   const prixM2List = dvfData.filter(d => {
                       const v = d.valeur;
                       const s = parseFloat(cleanVal(d.surface_reelle_bati)) || parseFloat(cleanVal(d.surface_terrain));
                       return v && v > 0 && s && s > 0;
                   }).map(d => {
                       const s = parseFloat(cleanVal(d.surface_reelle_bati)) || parseFloat(cleanVal(d.surface_terrain));
                       return d.valeur / s;
                   });
                   prixMoyenM2 = prixM2List.length > 0 ? Math.round(prixM2List.reduce((a, b) => a + b, 0) / prixM2List.length) : null;
                   // Prix médian
                   if (prixM2List.length > 0) {
                       const sorted = [...prixM2List].sort((a,b) => a - b);
                       const mid = Math.floor(sorted.length / 2);
                       prixMedianM2 = Math.round(sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid-1] + sorted[mid]) / 2);
                   }
                                
               } catch(e) { console.warn("Erreur DVF", e); }
               
               // Reverse geocoding pour obtenir l'adresse
               let parcelAddress = '';
               try {
                   const revRes = await fetch(`https://api-adresse.data.gouv.fr/reverse/?lon=${lon}&lat=${lat}&limit=1`);
                   if (revRes.ok) {
                       const revJson = await revRes.json();
                       if (revJson.features && revJson.features.length > 0) {
                           parcelAddress = revJson.features[0].properties.label || '';
                       }
                   }
               } catch(e) {}
               
               const parcelDataFinal = {
                  num, section, area: parcel.properties.contenance, city: cityname, citycode: citycode, lon: lon, lat: lat, 
                  address: parcelAddress,
                  risks: finalRisks, dvf: dvfData, zoning: zoning, isLoading: false, reportUrl: parcelReportUrl,
                  prescriptions, servitudes, communeInfo, prixMoyenM2, prixMedianM2, reglementUrl
               };
               setActiveParcelData(parcelDataFinal);
               // Stocker les données dans le polygon pour pouvoir les restaurer au clic sidebar
               setPolygons(prev => {
                   const last = prev[prev.length - 1];
                   if (last && last.isOfficial && last.name === `Parcelle ${num}`) {
                       return [...prev.slice(0, -1), { ...last, parcelData: parcelDataFinal }];
                   }
                   return prev;
               });
            } catch(e) {
               console.error(e);
               setActiveParcelData({ num, section, city: 'Inconnue', risks: [], dvf: [], isLoading: false, error: true });
            }

          }
        } catch (err) { showToast("Impossible de récupérer la géométrie de la parcelle.", 'error'); }
        setIsLoading(false);
      };

      const handleGeolocate = () => {
        if (!navigator.geolocation) return showToast("Géolocalisation non supportée.", 'error');
        setIsLoading(true);
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lon = position.coords.longitude;
            const lat = position.coords.latitude;
            const x = (lon * Math.PI / 180) * R;
            const y = Math.log(Math.tan(Math.PI / 4 + (lat * Math.PI / 180) / 2)) * R;
            if (mapModeRef.current === 'local') {
              localContextRef.current = { polygons: polygonsRef.current, lines: linesRef.current, viewport: viewportRef.current, calibrationPoints: calibrationPointsRef.current, unitsPerMeter: unitsPerMeterRef.current, localImage: localImageRef.current };
            }
            setViewport(v => ({ ...v, center: { x, y }, resolution: 0.5 })); 
            setLocalImage(null); setMapMode('api'); setMode('auto-select'); setActiveParcelData(null);
            setIsLoading(false);
          },
          (error) => {
            showToast("Impossible de vous localiser. Vérifiez vos permissions.", 'error');
            setIsLoading(false);
          }
        );
      };

      // Refs pour closures stables dans les event listeners natifs
      const viewportRef = useRef(viewport);
      useEffect(() => { viewportRef.current = viewport; }, [viewport]);
      const mapModeRef = useRef(mapMode);
      useEffect(() => { mapModeRef.current = mapMode; }, [mapMode]);
      const polygonsRef = useRef(polygons);
      useEffect(() => { polygonsRef.current = polygons; }, [polygons]);
      const linesRef = useRef(lines);
      useEffect(() => { linesRef.current = lines; }, [lines]);
      const calibrationPointsRef = useRef(calibrationPoints);
      useEffect(() => { calibrationPointsRef.current = calibrationPoints; }, [calibrationPoints]);
      const unitsPerMeterRef = useRef(unitsPerMeter);
      useEffect(() => { unitsPerMeterRef.current = unitsPerMeter; }, [unitsPerMeter]);
      const localImageRef = useRef(localImage);
      useEffect(() => { localImageRef.current = localImage; }, [localImage]);
      const activeParcelDataRef = useRef(activeParcelData);
      useEffect(() => { activeParcelDataRef.current = activeParcelData; }, [activeParcelData]);

      // Wheel : listener stable (bind une seule fois)
      useEffect(() => {
        const container = containerRef.current;
        if (!container) return;
        const onWheel = (e) => {
          const mm = mapModeRef.current;
          if (mm === 'none') return;
          // Ne pas zoomer si le wheel vient d'un panneau flottant (qui a son propre scroll)
          if (e.target.closest && e.target.closest('[data-panel]')) return;
          e.preventDefault();
          const vp = viewportRef.current;
          const factor = Math.exp(-e.deltaY * 0.002);
          let newRes = vp.resolution / factor;
          newRes = Math.max(0.05, Math.min(newRes, mm === 'api' ? 100 : 10));
          const rect = container.getBoundingClientRect();
          const mouseGeo = pxToGeo(e.clientX - rect.left, e.clientY - rect.top, vp);
          const newCx = mouseGeo.x - (e.clientX - rect.left - vp.width / 2) * newRes;
          const newCy = mouseGeo.y + (e.clientY - rect.top - vp.height / 2) * newRes;
          setViewport(v => ({ ...v, center: { x: newCx, y: newCy }, resolution: newRes }));
        };
        container.addEventListener('wheel', onWheel, { passive: false });
        return () => container.removeEventListener('wheel', onWheel);
      }, []);

      // Touch support (pinch-to-zoom + drag)
      const lastTouchRef = useRef(null);
      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const tCenter = (ts) => { let x=0,y=0; for(let i=0;i<ts.length;i++){x+=ts[i].clientX;y+=ts[i].clientY;} return {x:x/ts.length,y:y/ts.length}; };
        const tDist = (ts) => ts.length<2 ? 0 : Math.hypot(ts[0].clientX-ts[1].clientX, ts[0].clientY-ts[1].clientY);
        const onTS = (e) => { if(mapModeRef.current==='none') return; lastTouchRef.current={center:tCenter(e.touches),dist:tDist(e.touches)}; dragMovedRef.current=false; setIsDragging(true); };
        const onTM = (e) => { const lt=lastTouchRef.current; if(!lt||mapModeRef.current==='none') return; e.preventDefault(); const vp=viewportRef.current; const c=tCenter(e.touches); const dx=c.x-lt.center.x,dy=c.y-lt.center.y; if(Math.abs(dx)>1||Math.abs(dy)>1) dragMovedRef.current=true; let nr=vp.resolution; if(e.touches.length>=2&&lt.dist>0){nr=Math.max(0.05,Math.min(vp.resolution/(tDist(e.touches)/lt.dist),mapModeRef.current==='api'?100:10));} setViewport(v=>({...v,center:{x:v.center.x-dx*v.resolution,y:v.center.y+dy*v.resolution},resolution:nr})); lastTouchRef.current={center:c,dist:tDist(e.touches)}; };
        const onTE = (e) => { if(e.touches.length===0){lastTouchRef.current=null;setIsDragging(false);} else{lastTouchRef.current={center:tCenter(e.touches),dist:tDist(e.touches)};} };
        el.addEventListener('touchstart',onTS,{passive:false}); el.addEventListener('touchmove',onTM,{passive:false}); el.addEventListener('touchend',onTE,{passive:false});
        return()=>{el.removeEventListener('touchstart',onTS);el.removeEventListener('touchmove',onTM);el.removeEventListener('touchend',onTE);};
      }, []);

      const handleMouseDown = (e) => {
        if (mapMode === 'none') return;
        if (!containerRef.current || !containerRef.current.contains(e.target)) return;
        setIsDragging(true); dragMovedRef.current = false; dragStartRef.current = { x: e.clientX, y: e.clientY };
      };

      const handleMouseMove = (e) => {
        if (!isDragging) return;
        const dx = e.clientX - dragStartRef.current.x; const dy = e.clientY - dragStartRef.current.y;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMovedRef.current = true;
        setViewport(v => ({ ...v, center: { x: v.center.x - dx * v.resolution, y: v.center.y + dy * v.resolution } }));
        dragStartRef.current = { x: e.clientX, y: e.clientY };
      };

      const handleMouseUp = (e) => {
        if (!isDragging) return;
        setIsDragging(false);
        if (!dragMovedRef.current && mapMode !== 'none') {
          if (!containerRef.current || !containerRef.current.contains(e.target)) return;
          const rect = containerRef.current.getBoundingClientRect();
          const geo = pxToGeo(e.clientX - rect.left, e.clientY - rect.top, viewport);
          if (mode === 'auto-select' && mapMode === 'api') {
            const lon = (geo.x / R) * 180 / Math.PI;
            const lat = (2 * Math.atan(Math.exp(geo.y / R)) - Math.PI / 2) * 180 / Math.PI;
            fetchParcelFromClick(lon, lat);
          } 
          else if (mode === 'calibrate' && calibrationPoints.length < 2) setCalibrationPoints(prev => [...prev, geo]);
          else if (mode === 'draw' || mode === 'measure') setCurrentPoints(prev => [...prev, geo]);
        }
      };

      const getTile = (layer, z, x, y) => {
        const key = `${layer}_${z}_${x}_${y}`;
        if (tileCache.current[key]) {
          const idx = tileCacheKeys.current.indexOf(key);
          if (idx > -1) { tileCacheKeys.current.splice(idx, 1); tileCacheKeys.current.push(key); }
          return tileCache.current[key];
        }
        let url = '';
        if (layer === 'ortho') url = `https://data.geopf.fr/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=ORTHOIMAGERY.ORTHOPHOTOS&STYLE=normal&FORMAT=image/jpeg&TILEMATRIXSET=PM&TILEMATRIX=${z}&TILEROW=${y}&TILECOL=${x}`;
        else if (layer === 'plan') url = `https://data.geopf.fr/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=GEOGRAPHICALGRIDSYSTEMS.PLANIGNV2&STYLE=normal&FORMAT=image/png&TILEMATRIXSET=PM&TILEMATRIX=${z}&TILEROW=${y}&TILECOL=${x}`;
        else if (layer === 'cadastre') url = `https://data.geopf.fr/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=CADASTRALPARCELS.PARCELLAIRE_EXPRESS&STYLE=normal&FORMAT=image/png&TILEMATRIXSET=PM&TILEMATRIX=${z}&TILEROW=${y}&TILECOL=${x}`;
        else if (layer === 'osm') url = `https://tile.openstreetmap.org/${z}/${x}/${y}.png`;
        
        const tile = { loaded: false, img: new Image() };
        tileCache.current[key] = tile;
        tileCacheKeys.current.push(key);
        while (tileCacheKeys.current.length > TILE_CACHE_MAX) {
          const old = tileCacheKeys.current.shift();
          if (tileCache.current[old]) tileCache.current[old].img.src = '';
          delete tileCache.current[old];
        }
        tile.img.crossOrigin = "anonymous";
        tile.img.onload = () => { tile.loaded = true; setRenderTrigger(prev => prev + 1); };
        tile.img.onerror = () => { tile.error = true; };
        tile.img.src = url;
        return tile;
      };

      const calculateDistance = (pts) => {
        let dist = 0;
        for(let i=1; i<pts.length; i++) {
           const dx = pts[i].x - pts[i-1].x;
           const dy = pts[i].y - pts[i-1].y;
           dist += Math.sqrt(dx*dx + dy*dy);
        }
        if (mapMode === 'api') {
           const centerLat = (2 * Math.atan(Math.exp(viewport.center.y / R)) - Math.PI / 2) * 180 / Math.PI;
           dist *= Math.cos(centerLat * Math.PI / 180);
        } else if (unitsPerMeter) {
           dist /= unitsPerMeter;
        }
        return dist;
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas || viewport.width === 0 || mapMode === 'none') return;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = viewport.width * dpr; canvas.height = viewport.height * dpr;
        canvas.style.width = `${viewport.width}px`; canvas.style.height = `${viewport.height}px`;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, viewport.width, viewport.height);

        if (baseMap === 'cadastre') {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0,0, viewport.width, viewport.height);
        }

        if (mapMode === 'api') {
          let z = Math.round(Math.log2(INITIAL_RESOLUTION / viewport.resolution));

          const vpMaxY = viewport.center.y + (viewport.height / 2) * viewport.resolution;
          const minTile = getTileAtGeo(vpMinX, vpMaxY, z);
          const maxTile = getTileAtGeo(vpMaxX, vpMinY, z);

          const layers = [];
          if (baseMap === 'ortho') layers.push('ortho', 'cadastre');
          else if (baseMap === 'plan') layers.push('plan', 'cadastre');
          else if (baseMap === 'cadastre') layers.push('cadastre');
          else if (baseMap === 'osm') layers.push('osm', 'cadastre');

          layers.forEach(layer => {
            for (let tx = minTile.tx; tx <= maxTile.tx; tx++) {
              for (let ty = minTile.ty; ty <= maxTile.ty; ty++) {
                const tile = getTile(layer, z, tx, ty);
                const geoTL = getGeoAtTile(tx, ty, z);
                const geoBR = getGeoAtTile(tx + 1, ty + 1, z);
                const pxTL = geoToPx(geoTL.gx, geoTL.gy, viewport);
                const pxBR = geoToPx(geoBR.gx, geoBR.gy, viewport);
                const w = Math.ceil(pxBR.x - pxTL.x) + 1; const h = Math.ceil(pxBR.y - pxTL.y) + 1;

                if (tile.loaded) {
                  ctx.drawImage(tile.img, Math.floor(pxTL.x), Math.floor(pxTL.y), w, h);
                } else if (!tile.error && layer === 'ortho') {
                  const pTx = Math.floor(tx / 2); const pTy = Math.floor(ty / 2);
                  const parentTile = tileCache.current[`${layer}_${z-1}_${pTx}_${pTy}`];
                  if (parentTile && parentTile.loaded) {
                    const sX = (tx % 2) * 128; const sY = (ty % 2) * 128;
                    ctx.drawImage(parentTile.img, sX, sY, 128, 128, Math.floor(pxTL.x), Math.floor(pxTL.y), w, h);
                  } else {
                    ctx.fillStyle = darkMode ? '#0f172a' : '#e2e8f0';
                    ctx.fillRect(Math.floor(pxTL.x), Math.floor(pxTL.y), w, h);
                  }
                }
              }
            }
          });
        } else if (mapMode === 'local' && localImage) {
          const tl = geoToPx(0, localImage.height, viewport);
          const br = geoToPx(localImage.width, 0, viewport);
          ctx.drawImage(localImage, tl.x, tl.y, br.x - tl.x, br.y - tl.y);

        lines.forEach(line => {
           ctx.strokeStyle = line.color;

        });

        const drawnLabelsBoxes = [];
        const checkCollision = (box1, box2) => {
          const margin = 4;

        polygons.forEach((poly) => {

          });

          if (poly.points.length > 0) {
            const pxPoints = poly.points.map(pt => geoToPx(pt.x, pt.y, viewport));
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (let i = 0; i < pxPoints.length; i++) {
              if (pxPoints[i].x < minX) minX = pxPoints[i].x;
              if (pxPoints[i].x > maxX) maxX = pxPoints[i].x;
              if (pxPoints[i].y < minY) minY = pxPoints[i].y;
              if (pxPoints[i].y > maxY) maxY = pxPoints[i].y;
            }
            let targetX = minX + (maxX - minX) / 2; let targetY = minY + (maxY - minY) / 2;

            ctx.fillStyle = 'white'; ctx.font = '900 18px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            const nameText = poly.name;
            const areaText = poly.area !== null && poly.area !== undefined ? `${formatArea(poly.area, displayUnit)}` : '';
            const nameMetrics = ctx.measureText(nameText);
            const areaMetrics = areaText ? ctx.measureText(areaText) : { width: 0 };
            const textWidth = Math.max(nameMetrics.width, areaMetrics.width) + 10;
            const textHeight = areaText ? 50 : 25; 

            let collision = true; let attempt = 0; let angle = 0; let radius = 0;
            while (collision && attempt < 50) {
                const currentBox = { left: targetX - textWidth/2, right: targetX + textWidth/2, top: targetY - textHeight/2, bottom: targetY + textHeight/2 };
                collision = drawnLabelsBoxes.some(drawnBox => checkCollision(currentBox, drawnBox));
                if (collision) {
                    attempt++; angle += Math.PI / 4; radius += 4; 
                    targetX = (minX + (maxX - minX) / 2) + Math.cos(angle) * radius;
                    targetY = (minY + (maxY - minY) / 2) + Math.sin(angle) * radius;
                } else { drawnLabelsBoxes.push(currentBox); }
            }

            ctx.strokeStyle = 'rgba(0,0,0,0.85)'; ctx.lineWidth = 4;
            const yOffsetName = areaText ? -12 : 0;
            ctx.strokeText(nameText, targetX, targetY + yOffsetName); ctx.fillText(nameText, targetX, targetY + yOffsetName);
            if (areaText) { ctx.strokeText(areaText, targetX, targetY + 14); ctx.fillText(areaText, targetX, targetY + 14); }
          }
        });

        // Lignes DVF (relient parcelle sélectionnée aux parcelles vendues)
        if (dvfLinks.length > 0) {
          dvfLinks.forEach(link => {
            const fromPx = geoToPx(link.from.x, link.from.y, viewport);
            const toPx = geoToPx(link.to.x, link.to.y, viewport);
            // Trait rouge continu épais
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(fromPx.x, fromPx.y);
            ctx.lineTo(toPx.x, toPx.y);
            ctx.stroke();
            // Cercles aux extrémités
            [fromPx, toPx].forEach(pt => {
              ctx.fillStyle = '#ef4444';
              ctx.beginPath(); ctx.arc(pt.x, pt.y, 6, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = 'white';
              ctx.beginPath(); ctx.arc(pt.x, pt.y, 3, 0, Math.PI * 2); ctx.fill();
            });
            // Distance — bulle au milieu du trait
            const midX = (fromPx.x + toPx.x) / 2;
            const midY = (fromPx.y + toPx.y) / 2;
            const dxGeo = link.to.x - link.from.x;
            const dyGeo = link.to.y - link.from.y;
            const distGeo = Math.sqrt(dxGeo*dxGeo + dyGeo*dyGeo);
            const centerLat = (2 * Math.atan(Math.exp(viewport.center.y / R)) - Math.PI / 2) * 180 / Math.PI;
            const distMeters = distGeo * Math.cos(centerLat * Math.PI / 180);
            const distText = distMeters < 1000 ? `${Math.round(distMeters)}m` : `${(distMeters/1000).toFixed(1)}km`;
            ctx.font = 'bold 12px sans-serif';
            const tw = ctx.measureText(distText).width;
            const bw = tw + 14, bh = 22;
            // Bulle fond blanc
            ctx.fillStyle = 'white';
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(midX - bw/2, midY - bh/2, bw, bh, 6);
            ctx.fill(); ctx.stroke();

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(distText, midX, midY);
          });
        }

        if (currentPoints.length > 0 && (mode === 'draw' || mode === 'measure')) {
          ctx.fillStyle = activeColor; ctx.strokeStyle = activeColor; ctx.lineWidth = 3;
          ctx.beginPath();
          currentPoints.forEach((pt, index) => {
            const pxPt = geoToPx(pt.x, pt.y, viewport);

          }
          try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const page = await pdf.getPage(1);

        } else {

      const applyCalibration = () => {
        if (calibrationPoints.length === 2 && knownDistance > 0) {
          const dx = calibrationPoints[1].x - calibrationPoints[0].x;
          const dy = calibrationPoints[1].y - calibrationPoints[0].y;
          const distUnits = Math.sqrt(dx * dx + dy * dy);
          
          let multiplier = 1;
          if (calibrationUnit === 'mm') multiplier = 0.001;
          else if (calibrationUnit === 'cm') multiplier = 0.01;
          else if (calibrationUnit === 'km') multiplier = 1000;
          
          const distanceInMeters = parseFloat(knownDistance) * multiplier;
          const newUnitsPerMeter = distUnits / distanceInMeters;
          
          setUnitsPerMeter(newUnitsPerMeter);
          setMode('draw');

          setPolygons(prev => prev.map(poly => {
            if (poly.isOfficial) return poly; 
            
            let areaPx = 0;
            for (let i = 0; i < poly.points.length; i++) {
              const j = (i + 1) % poly.points.length;
              areaPx += poly.points[i].x * poly.points[j].y;
              areaPx -= poly.points[j].x * poly.points[i].y;
            }
            areaPx = Math.abs(areaPx) / 2;
            
            return { ...poly, area: areaPx / (newUnitsPerMeter * newUnitsPerMeter) };
          }));
        }
      };

      const completePolygon = () => {
        if (mode === 'measure' && currentPoints.length >= 2) {

            area += currentPoints[i].x * currentPoints[j].y;

          if (mapMode === 'api') {

          setPolygons(prev => [...prev, { id: uid(), name: parcelName, points: currentPoints, border: activeColor, area: realArea, isOfficial: false }]);

      // Animation fluide du viewport
      const animateViewport = (targetCenter, targetRes) => {
        const start = { x: viewportRef.current.center.x, y: viewportRef.current.center.y, res: viewportRef.current.resolution };
        const end = { x: targetCenter.x, y: targetCenter.y, res: targetRes };
        const duration = 400;
        const startTime = Date.now();
        const easeOut = t => 1 - Math.pow(1 - t, 3);
        const step = () => {
          const elapsed = Date.now() - startTime;
          const t = Math.min(elapsed / duration, 1);
          const e = easeOut(t);
          setViewport(v => ({
            ...v,
            center: { x: start.x + (end.x - start.x) * e, y: start.y + (end.y - start.y) * e },
            resolution: start.res + (end.res - start.res) * e
          }));
          if (t < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      };

      const centerOnPolygon = (poly) => {

        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        for (const pt of poly.points) {
          if (pt.x < minX) minX = pt.x; if (pt.x > maxX) maxX = pt.x;
          if (pt.y < minY) minY = pt.y; if (pt.y > maxY) maxY = pt.y;
        }
        const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
        const spanX = maxX - minX, spanY = maxY - minY;
        const newRes = Math.max(spanX / (viewport.width * 0.4), spanY / (viewport.height * 0.4), 0.15);
        animateViewport({ x: cx, y: cy }, newRes);
        if (poly.parcelData) {
          setActiveParcelData(poly.parcelData);
        }
      };

      // Localiser une parcelle DVF sur la carte par son ID parcelle
      const locateDvfParcel = async (parcelIdStr) => {
        if (!parcelIdStr || parcelIdStr.length < 10) return;
        // Extraire commune, section, numero depuis l'ID : CCCCC PPP SS NNNN
        const commune = parcelIdStr.substring(0, 5);
        const prefix = parcelIdStr.substring(5, 8);
        const section = parcelIdStr.substring(8, 10);
        const numero = parcelIdStr.substring(10);
        
        showToast(`Recherche de la parcelle ${section}${numero}...`, 'info');
        try {
          const res = await fetch(`https://apicarto.ign.fr/api/cadastre/parcelle?code_insee=${commune}&section=${section}&numero=${numero}`);
          if (!res.ok) throw new Error();
          const data = await res.json();
          if (data.features && data.features.length > 0) {
            const parcel = data.features[0];
            const coords = parcel.geometry.type === 'Polygon' ? parcel.geometry.coordinates[0] : parcel.geometry.coordinates[0][0];
            // Calculer le centre de la parcelle trouvée
            let sumLon = 0, sumLat = 0;
            coords.forEach(c => { sumLon += c[0]; sumLat += c[1]; });
            const cLon = sumLon / coords.length;
            const cLat = sumLat / coords.length;
            const targetX = (cLon * Math.PI / 180) * R;
            const targetY = Math.log(Math.tan(Math.PI / 4 + (cLat * Math.PI / 180) / 2)) * R;
            
            // Centre de la parcelle d'origine
            const originX = (activeParcelDataRef.current?.lon * Math.PI / 180) * R;
            const originY = Math.log(Math.tan(Math.PI / 4 + (activeParcelDataRef.current?.lat * Math.PI / 180) / 2)) * R;
            
            // Dessiner la ligne
            setDvfLinks(prev => [...prev, { from: { x: originX, y: originY }, to: { x: targetX, y: targetY } }]);
            
            // Calculer la distance exacte (Haversine) entre les deux centres
            const dLat2 = (cLat - activeParcelDataRef.current?.lat) * Math.PI / 180;
            const dLon2 = (cLon - activeParcelDataRef.current?.lon) * Math.PI / 180;
            const a2h = Math.sin(dLat2/2)**2 + Math.cos(activeParcelDataRef.current?.lat*Math.PI/180)*Math.cos(cLat*Math.PI/180)*Math.sin(dLon2/2)**2;
            const exactDist = Math.round(6371000 * 2 * Math.atan2(Math.sqrt(a2h), Math.sqrt(1-a2h)));
            
            // Mettre à jour la distance dans la liste DVF
            setActiveParcelData(prev => {
              if (!prev?.dvf) return prev;
              const updatedDvf = prev.dvf.map(d => {
                if (d.displayId === parcelIdStr) return { ...d, distance: exactDist };
                return d;
              });
              return { ...prev, dvf: updatedDvf };
            });
            
            // Dessiner le contour de la parcelle trouvée
            const geoPoints = coords.map(coord => ({
              x: (coord[0] * Math.PI / 180) * R, y: Math.log(Math.tan(Math.PI / 4 + (coord[1] * Math.PI / 180) / 2)) * R
            }));
            
            // Ajouter comme polygone highlight (garder les anciens)
            setPolygons(prev => [...prev, {

              area: parcel.properties.contenance, isOfficial: false, isDvfHighlight: true
            }]);
            
            // Zoomer avec animation pour voir les deux parcelles
            const allX = [originX, targetX];
            const allY = [originY, targetY];
            const minX = Math.min(...allX) - 50;
            const maxX = Math.max(...allX) + 50;
            const minY = Math.min(...allY) - 50;
            const maxY = Math.max(...allY) + 50;
            const newRes = Math.max((maxX - minX) / (viewport.width * 0.6), (maxY - minY) / (viewport.height * 0.6), 0.3);
            animateViewport({ x: (minX+maxX)/2, y: (minY+maxY)/2 }, newRes);
            
            showToast(`Parcelle ${section} ${numero} localisée`, 'success');
          } else {
            showToast(`Parcelle ${section}${numero} introuvable`, 'error');
          }
        } catch(e) {
          showToast(`Erreur de localisation`, 'error');
        }
      };

                                                         <a href={lbcLocation} target="_blank" rel="noreferrer" className={`flex-1 py-1.5 rounded-lg text-[8px] font-bold text-center transition-all hover:scale-[1.01] ${darkMode ? 'bg-orange-600 hover:bg-orange-500 text-white' : 'bg-orange-500 hover:bg-orange-600 text-white'}`}>LeBonCoin</a>
                                                         <a href={selogerLocation} target="_blank" rel="noreferrer" className={`flex-1 py-1.5 rounded-lg text-[8px] font-bold text-center transition-all hover:scale-[1.01] ${darkMode ? 'bg-red-600 hover:bg-red-500 text-white' : 'bg-red-500 hover:bg-red-600 text-white'}`}>SeLoger</a>
                                                         <a href={bieniciLocation} target="_blank" rel="noreferrer" className={`flex-1 py-1.5 rounded-lg text-[8px] font-bold text-center transition-all hover:scale-[1.01] ${darkMode ? 'bg-blue-600 hover:bg-blue-500 text-white' : 'bg-blue-500 hover:bg-blue-600 text-white'}`}>BienIci</a>
                                                     </div>
                                                 </div>
                                                 );
                                             })()}
                                             
                                             <a href="https://www.ecologie.gouv.fr/carte-des-loyers" target="_blank" rel="noreferrer" className={`w-full py-1.5 mt-1 rounded-lg text-[8px] font-bold uppercase tracking-wider text-center transition-all flex items-center justify-center shadow-sm hover:scale-[1.01] ${darkMode ? 'bg-slate-700 hover:bg-slate-600 text-slate-200 border border-slate-600' : 'bg-white hover:bg-slate-50 text-slate-700 border border-slate-200'}`}>
                                                 Carte des loyers ANIL
                                             </a>
                                             <p className={`text-[9px] text-center ${theme.textMuted}`}>Sources : DVF · ANIL · API Géo · Calculs surfaces.io</p>
                                         </div>
                                         </>
                                         );
                                     })()}
                                 </div>
                               )}
                             </>
                         )}
                      </div>
                    </div>
                    )}

                  {/* Contrôles Flottants Carte */}
                  <div className={`absolute ${activeParcelData ? 'bottom-[45%] md:bottom-6' : 'bottom-4 md:bottom-6'} right-2 md:right-6 flex flex-col gap-2 md:gap-3 z-30 pointer-events-auto transition-all`} onMouseDown={e=>e.stopPropagation()} onMouseMove={e=>e.stopPropagation()} onWheel={e=>e.stopPropagation()} data-panel="true">
                     {mapMode === 'api' && (
                        <div className={`flex flex-col bg-white rounded-lg shadow-lg border overflow-hidden cursor-auto ${darkMode ? 'bg-slate-800 border-slate-600' : 'bg-white border-slate-200'}`}>
                           <button onClick={() => setBaseMap('ortho')} className={`px-3 py-2 text-[10px] font-bold uppercase ${baseMap === 'ortho' ? 'bg-emerald-500 text-white' : (darkMode ? 'text-slate-300 hover:bg-slate-700' : 'text-slate-600 hover:bg-slate-50')}`}>Satellite</button>
                           <button onClick={() => setBaseMap('plan')} className={`px-3 py-2 text-[10px] font-bold uppercase border-y ${darkMode ? 'border-slate-700' : 'border-slate-100'} ${baseMap === 'plan' ? 'bg-emerald-500 text-white' : (darkMode ? 'text-slate-300 hover:bg-slate-700' : 'text-slate-600 hover:bg-slate-50')}`}>Plan IGN</button>
                           <button onClick={() => setBaseMap('cadastre')} className={`px-3 py-2 text-[10px] font-bold uppercase ${baseMap === 'cadastre' ? 'bg-emerald-500 text-white' : (darkMode ? 'text-slate-300 hover:bg-slate-700' : 'text-slate-600 hover:bg-slate-50')}`}>Cadastre</button>
                        </div>
                     )}

                     <button onClick={handleGeolocate} className={`p-3 rounded-full shadow-lg border flex items-center justify-center transition-transform hover:scale-105 cursor-pointer ${darkMode ? 'bg-emerald-600 border-emerald-500 text-white' : 'bg-white border-slate-200 text-emerald-600'}`} title="Me localiser">
                       <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                     </button>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
